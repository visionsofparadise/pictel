name: Publish @pictel/ml

on:
  push:
    branches: [main]
    paths:
      - 'packages/ml/package.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@11

      - name: Check if version is already published
        id: check
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/ml/package.json').version")
          PUBLISHED=$(npm view @pictel/ml@$PACKAGE_VERSION version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PACKAGE_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Type check and lint
        if: steps.check.outputs.skip == 'false'
        run: npx turbo check --filter=@pictel/ml

      - name: Run unit tests
        if: steps.check.outputs.skip == 'false'
        run: npx turbo unit --filter=@pictel/ml

      - name: Build (topo-ordered)
        if: steps.check.outputs.skip == 'false'
        run: npx turbo build --filter=@pictel/ml

      - name: Install Playwright Chromium
        if: steps.check.outputs.skip == 'false'
        run: npx playwright install chromium --with-deps

      # @pictel/ml has no integration set and turbo's `^integration` does not
      # materialize a task for a package that lacks the script, so
      # `--filter=@pictel/ml` would plan zero integration tasks. Gate on ml's
      # runtime dependency instead (pictel's browser integration set).
      #
      # ml's heavy set (real models + hardware WebGPU) cannot run on GitHub
      # runners (no GPU), so it is a LOCAL pre-publish gate Matt runs before
      # bumping the version: `npm run integration:heavy -w @pictel/ml`
      # (per design-publishing 2026-07-10).
      - name: Run integration tests (pictel — ml's runtime dependency)
        if: steps.check.outputs.skip == 'false'
        run: npx turbo run integration --filter=pictel

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        run: npm publish --workspace=packages/ml --access public
