name: Publish @pictel/effects

on:
  push:
    branches: [main]
    paths:
      - 'packages/effects/package.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@11

      - name: Check if version is already published
        id: check
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/effects/package.json').version")
          PUBLISHED=$(npm view @pictel/effects@$PACKAGE_VERSION version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PACKAGE_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Type check and lint
        if: steps.check.outputs.skip == 'false'
        run: npx turbo check --filter=@pictel/effects

      - name: Run unit tests
        if: steps.check.outputs.skip == 'false'
        run: npx turbo unit --filter=@pictel/effects

      - name: Build (topo-ordered)
        if: steps.check.outputs.skip == 'false'
        run: npx turbo build --filter=@pictel/effects

      - name: Install Playwright Chromium
        if: steps.check.outputs.skip == 'false'
        run: npx playwright install chromium --with-deps

      - name: Cache fixture assets
        if: steps.check.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: packages/effects/integration-fixtures/assets
          key: assets-${{ hashFiles('packages/effects/integration-fixtures/assets.manifest.json') }}

      - name: Fetch fixture assets
        if: steps.check.outputs.skip == 'false'
        run: npm run fixtures:assets -w @pictel/effects

      - name: Run integration tests
        if: steps.check.outputs.skip == 'false'
        run: npx turbo run integration --filter=@pictel/effects

      # Direct package script, not `turbo run integration:heavy --filter=@pictel/effects`:
      # @pictel/ml is a devDependency of @pictel/effects, so turbo's
      # `^integration:heavy` topo would pull @pictel/ml#integration:heavy (a real
      # GPU/model task) into the plan and fail on a GPU-less runner. Running the
      # effects script directly scopes it to effects' heavy set alone.
      - name: Run heavy integration tests (effects only)
        if: steps.check.outputs.skip == 'false'
        run: npm run integration:heavy -w @pictel/effects

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        run: npm publish --workspace=packages/effects --access public
