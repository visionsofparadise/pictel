name: Publish @pictel/cli

on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/package.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@11

      - name: Check if version is already published
        id: check
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/cli/package.json').version")
          PUBLISHED=$(npm view @pictel/cli@$PACKAGE_VERSION version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PACKAGE_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Type check and lint
        if: steps.check.outputs.skip == 'false'
        run: npx turbo check --filter=@pictel/cli

      - name: Run unit tests
        if: steps.check.outputs.skip == 'false'
        run: npx turbo unit --filter=@pictel/cli

      - name: Build (topo-ordered)
        if: steps.check.outputs.skip == 'false'
        run: npx turbo build --filter=@pictel/cli

      # The cli render drives puppeteer's own bundled chromium (installed by
      # puppeteer's postinstall on `npm ci`), but turbo's `^integration` topo
      # pulls pictel + effects integration first, which need playwright chromium
      # and the effects fixture assets.
      - name: Install Playwright Chromium
        if: steps.check.outputs.skip == 'false'
        run: npx playwright install chromium --with-deps

      - name: Cache fixture assets
        if: steps.check.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: packages/effects/integration-fixtures/assets
          key: assets-${{ hashFiles('packages/effects/integration-fixtures/assets.manifest.json') }}

      - name: Fetch fixture assets
        if: steps.check.outputs.skip == 'false'
        run: npm run fixtures:assets -w @pictel/effects

      - name: Run integration tests
        if: steps.check.outputs.skip == 'false'
        run: npx turbo run integration --filter=@pictel/cli

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        run: npm publish --workspace=packages/cli --access public
